name = "lean-planner"
description = "Exceptional-use planner for architecture decisions, destructive migrations, conflicting requirements, or high-rollback-risk changes. Never use for ordinary implementation."
model = "gpt-5.6-sol"
model_reasoning_effort = "medium"
